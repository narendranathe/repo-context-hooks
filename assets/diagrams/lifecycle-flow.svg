<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440" role="img" aria-labelledby="title desc">
  <title id="title">repo-context-hooks interrupted-task lifecycle flow</title>
  <desc id="desc">A concrete continuity story where a bugfix is interrupted by compact, checkpoint written to specs/README.md, and the next session resumes from repo state.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="58%" stop-color="#f2d6a4"/>
      <stop offset="100%" stop-color="#c98d50"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#203a33"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b54720"/>
      <stop offset="48%" stop-color="#e6a92f"/>
      <stop offset="100%" stop-color="#2f6f5e"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#3a2410" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 1 1 L 9 5 L 1 9 z" fill="#2f6f5e"/>
    </marker>
  </defs>


  <style>
    .eyebrow { font: 800 15px Aptos, Segoe UI, sans-serif; letter-spacing: 3px; text-transform: uppercase; fill: #8f3d22; }
    .headline { font: 800 44px Georgia, serif; letter-spacing: -1.8px; fill: #17120b; }
    .subhead { font: 600 19px Aptos, Segoe UI, sans-serif; fill: #5d4630; }
    .card-title { font: 800 23px Georgia, serif; fill: #17120b; }
    .card-title-light { font: 800 23px Georgia, serif; fill: #fff8e8; }
    .label { font: 800 13px Aptos, Segoe UI, sans-serif; letter-spacing: 2px; text-transform: uppercase; fill: #8f3d22; }
    .body { font: 600 16px Aptos, Segoe UI, sans-serif; fill: #4f3e2d; }
    .body-light { font: 600 16px Aptos, Segoe UI, sans-serif; fill: #efe2c8; }
    .small { font: 600 14px Aptos, Segoe UI, sans-serif; fill: #6e5943; }
    .small-light { font: 600 14px Aptos, Segoe UI, sans-serif; fill: #d8c7a8; }
  </style>

  <rect width="1120" height="440" rx="36" fill="url(#paper)"/>
  <text class="eyebrow" x="64" y="62">Concrete continuity story</text>
  <text class="headline" x="64" y="112">Bugfix interrupted by compact</text>
  <text class="subhead" x="68" y="148">The repo keeps the thread of work alive when the session cannot.</text>

  <rect x="64" y="204" width="214" height="154" rx="24" fill="#fffaf0" stroke="#17120b" stroke-opacity=".14"/>
  <text class="card-title" x="92" y="248">SessionStart</text>
  <text class="body" x="92" y="282">Open failing PR note</text>
  <text class="small" x="92" y="310">task comes from</text>
  <text class="small" x="92" y="334">checked-in docs</text>

  <rect x="326" y="204" width="214" height="154" rx="24" fill="#fff7ed" stroke="#b54720" stroke-opacity=".45"/>
  <text class="card-title" x="354" y="248">PreCompact</text>
  <text class="body" x="354" y="282">Checkpoint written</text>
  <text class="small" x="354" y="310">to specs/README.md</text>
  <text class="small" x="354" y="334">before context shrinks</text>

  <rect x="588" y="204" width="214" height="154" rx="24" fill="#f0f7f4" stroke="#2f6f5e" stroke-opacity=".45"/>
  <text class="card-title" x="616" y="248">PostCompact</text>
  <text class="body" x="616" y="282">Reload repo summary</text>
  <text class="small" x="616" y="310">not the whole chat</text>
  <text class="small" x="616" y="334">team can review it</text>

  <rect x="850" y="204" width="206" height="154" rx="24" fill="#ecfdf5" stroke="#2f6f5e" stroke-opacity=".55"/>
  <text class="card-title" x="878" y="248">Next Session</text>
  <text class="body" x="878" y="282">Next session resumes</text>
  <text class="small" x="878" y="310">from repo state</text>
  <text class="small" x="878" y="334">with the next fix</text>

  <line x1="282" y1="282" x2="318" y2="282" stroke="#2f6f5e" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="544" y1="282" x2="580" y2="282" stroke="#2f6f5e" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="806" y1="282" x2="842" y2="282" stroke="#2f6f5e" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
