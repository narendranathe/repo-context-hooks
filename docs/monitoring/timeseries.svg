<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Telemetry time series</title>
  <desc id="desc">Generated from docs/monitoring/history.json for repo-context-hooks. Shows score 90, baseline 20, uplift 70, 32 hook events, lifecycle coverage 100 percent, previous period 2026-04-24, latest period 2026-04-25, daily event bars, score trend, and event counts.</desc>
  <defs>
