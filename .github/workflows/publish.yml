name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for PyPI Trusted Publisher (OIDC)

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tool
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-on-testpypi:
    name: Test install from TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install from TestPyPI and smoke-test
        run: |
          pip install --index-url https://test.pypi.org/simple/ --no-deps repo-context-hooks
          repo-context-hooks --help

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test-on-testpypi
    environment: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
