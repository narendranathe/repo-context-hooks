<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Telemetry proof strip</title>
  <desc id="desc">Telemetry proof for repo-context-hooks showing Score 90, +70 uplift, 32 hook events, 100% lifecycle coverage, Prometheus-ready metrics, Grafana dashboard path, Datadog via OpenMetrics, and local-only telemetry.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5dc"/>
      <stop offset="0.52" stop-color="#f0d9ad"/>
      <stop offset="1" stop-color="#d7b77e"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17212b"/>
      <stop offset="1" stop-color="#0b1016"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b54720"/>
      <stop offset="0.55" stop-color="#e5a92f"/>
      <stop offset="1" stop-color="#3b7a61"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="1136" height="356" rx="34" fill="url(#paper)"/>
  <rect x="56" y="56" width="1088" height="308" rx="26" fill="#fff9ea" opacity="0.72"/>
  <rect x="82" y="84" width="352" height="244" rx="24" fill="url(#ink)"/>
  <text x="112" y="128" fill="#f8e7be" font-family="Georgia, serif" font-size="34" font-weight="700">Telemetry proof</text>
  <text x="112" y="162" fill="#dcbf86" font-family="Segoe UI, sans-serif" font-size="18">local evidence, public snapshot, open metrics</text>
  <rect x="112" y="194" width="282" height="20" rx="10" fill="#31404d"/>
  <rect x="112" y="194" width="252" height="20" rx="10" fill="url(#signal)"/>
  <text x="112" y="252" fill="#fff6dc" font-family="Georgia, serif" font-size="72" font-weight="700">Score 90</text>
  <text x="114" y="292" fill="#e5a92f" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">+70 uplift</text>
  <text x="260" y="292" fill="#f8e7be" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">32 hook events</text>
  <circle cx="500" cy="116" r="30" fill="#b54720"/>
  <circle cx="500" cy="210" r="30" fill="#e5a92f"/>
  <circle cx="500" cy="304" r="30" fill="#3b7a61"/>
  <line x1="500" y1="146" x2="500" y2="180" stroke="#271a0f" stroke-width="8" stroke-linecap="round"/>
  <line x1="500" y1="240" x2="500" y2="274" stroke="#271a0f" stroke-width="8" stroke-linecap="round"/>
  <text x="548" y="124" fill="#20150c" font-family="Segoe UI, sans-serif" font-size="26" font-weight="800">100% lifecycle</text>
  <text x="548" y="156" fill="#6b5638" font-family="Segoe UI, sans-serif" font-size="17">session start, compact, reload, session end</text>
  <text x="548" y="218" fill="#20150c" font-family="Segoe UI, sans-serif" font-size="26" font-weight="800">Prometheus-ready</text>
  <text x="548" y="250" fill="#6b5638" font-family="Segoe UI, sans-serif" font-size="17">repo_context_hooks_continuity_score</text>
  <text x="548" y="312" fill="#20150c" font-family="Segoe UI, sans-serif" font-size="26" font-weight="800">Grafana dashboard</text>
  <text x="548" y="344" fill="#6b5638" font-family="Segoe UI, sans-serif" font-size="17">Datadog via OpenMetrics collector path</text>
  <rect x="884" y="92" width="220" height="72" rx="20" fill="#f5e2bd" stroke="#d3ad72" stroke-width="2"/>
  <text x="910" y="122" fill="#6a331f" font-family="Segoe UI, sans-serif" font-size="15" font-weight="800">PUBLIC README</text>
  <text x="910" y="148" fill="#1f160f" font-family="Segoe UI, sans-serif" font-size="20" font-weight="800">proof strip</text>
  <rect x="884" y="184" width="220" height="72" rx="20" fill="#f5e2bd" stroke="#d3ad72" stroke-width="2"/>
  <text x="910" y="214" fill="#6a331f" font-family="Segoe UI, sans-serif" font-size="15" font-weight="800">DOCS MONITOR</text>
  <text x="910" y="240" fill="#1f160f" font-family="Segoe UI, sans-serif" font-size="20" font-weight="800">time series</text>
  <rect x="884" y="276" width="220" height="72" rx="20" fill="#17212b"/>
  <text x="910" y="306" fill="#e5a92f" font-family="Segoe UI, sans-serif" font-size="15" font-weight="800">PRIVACY</text>
  <text x="910" y="332" fill="#fff6dc" font-family="Segoe UI, sans-serif" font-size="20" font-weight="800">local-only telemetry</text>
</svg>
