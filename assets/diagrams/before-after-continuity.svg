<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440" role="img" aria-labelledby="title desc">
  <title id="title">repo-context-hooks before and after continuity story</title>
  <desc id="desc">A concrete comparison showing repeated explanation before repo-native continuity and a clean resume from checked-in continuity after it.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="58%" stop-color="#f2d6a4"/>
      <stop offset="100%" stop-color="#c98d50"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#203a33"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b54720"/>
      <stop offset="48%" stop-color="#e6a92f"/>
      <stop offset="100%" stop-color="#2f6f5e"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#3a2410" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 1 1 L 9 5 L 1 9 z" fill="#2f6f5e"/>
    </marker>
  </defs>


  <style>
    .eyebrow { font: 800 15px Aptos, Segoe UI, sans-serif; letter-spacing: 3px; text-transform: uppercase; fill: #8f3d22; }
    .headline { font: 800 44px Georgia, serif; letter-spacing: -1.8px; fill: #17120b; }
    .subhead { font: 600 19px Aptos, Segoe UI, sans-serif; fill: #5d4630; }
    .card-title { font: 800 23px Georgia, serif; fill: #17120b; }
    .card-title-light { font: 800 23px Georgia, serif; fill: #fff8e8; }
    .label { font: 800 13px Aptos, Segoe UI, sans-serif; letter-spacing: 2px; text-transform: uppercase; fill: #8f3d22; }
    .body { font: 600 16px Aptos, Segoe UI, sans-serif; fill: #4f3e2d; }
    .body-light { font: 600 16px Aptos, Segoe UI, sans-serif; fill: #efe2c8; }
    .small { font: 600 14px Aptos, Segoe UI, sans-serif; fill: #6e5943; }
    .small-light { font: 600 14px Aptos, Segoe UI, sans-serif; fill: #d8c7a8; }
  </style>

  <rect width="1120" height="440" rx="36" fill="url(#paper)"/>
  <text class="eyebrow" x="64" y="62">Before and after handoffs</text>
  <text class="headline" x="64" y="112">Less repeated context, cleaner restarts</text>

  <rect x="72" y="170" width="430" height="206" rx="30" fill="#fef2f2" stroke="#b54720" stroke-opacity=".48" filter="url(#soft)"/>
  <text class="card-title" x="108" y="220" fill="#7f1d1d">Before</text>
  <text class="body" x="108" y="258">Same bug explained again</text>
  <text class="small" x="108" y="288">review comments reconstructed</text>
  <text class="small" x="108" y="314">failed steps retold from memory</text>
  <text class="body" x="108" y="346">Re-read the repo and resume review comments</text>

  <rect x="618" y="170" width="430" height="206" rx="30" fill="#ecfdf5" stroke="#2f6f5e" stroke-opacity=".5" filter="url(#soft)"/>
  <text class="card-title" x="654" y="220" fill="#14532d">After</text>
  <text class="body" x="654" y="258">Resume from checked-in continuity</text>
  <text class="small" x="654" y="288">README.md explains the story</text>
  <text class="small" x="654" y="314">specs/README.md carries next action</text>
  <text class="small" x="654" y="340">AGENTS.md guides the re-entry</text>

  <line x1="510" y1="274" x2="610" y2="274" stroke="#2f6f5e" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
