<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Context Continuity Engine</title>
  <desc id="desc">A repo-context-hooks hero image showing README.md, specs/README.md, AGENTS.md, hook events, impact monitor, Score 90, +70 uplift, and the next agent resumes warm.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="58%" stop-color="#f2d6a4"/>
      <stop offset="100%" stop-color="#c98d50"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#203a33"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b54720"/>
      <stop offset="48%" stop-color="#e6a92f"/>
      <stop offset="100%" stop-color="#2f6f5e"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#3a2410" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 1 1 L 9 5 L 1 9 z" fill="#2f6f5e"/>
    </marker>
  </defs>


  <style>
    .eyebrow { font: 800 15px Aptos, Segoe UI, sans-serif; letter-spacing: 3px; text-transform: uppercase; fill: #8f3d22; }
    .headline { font: 800 44px Georgia, serif; letter-spacing: -1.8px; fill: #17120b; }
    .subhead { font: 600 19px Aptos, Segoe UI, sans-serif; fill: #5d4630; }
    .card-title { font: 800 23px Georgia, serif; fill: #17120b; }
    .card-title-light { font: 800 23px Georgia, serif; fill: #fff8e8; }
    .label { font: 800 13px Aptos, Segoe UI, sans-serif; letter-spacing: 2px; text-transform: uppercase; fill: #8f3d22; }
    .body { font: 600 16px Aptos, Segoe UI, sans-serif; fill: #4f3e2d; }
    .body-light { font: 600 16px Aptos, Segoe UI, sans-serif; fill: #efe2c8; }
    .small { font: 600 14px Aptos, Segoe UI, sans-serif; fill: #6e5943; }
    .small-light { font: 600 14px Aptos, Segoe UI, sans-serif; fill: #d8c7a8; }
  </style>

  <rect width="1280" height="640" rx="42" fill="url(#paper)"/>
  <circle cx="1090" cy="140" r="210" fill="#2f6f5e" opacity=".16"/>
  <circle cx="180" cy="520" r="230" fill="#b54720" opacity=".14"/>
  <text class="eyebrow" x="72" y="76">repo-context-hooks</text>
  <text class="headline" x="72" y="126">Context Continuity Engine</text>
  <text class="subhead" x="76" y="164">Repo memory becomes measurable agent momentum without leaving git.</text>

  <rect x="72" y="230" width="250" height="176" rx="28" fill="#fffaf0" stroke="#17120b" stroke-opacity=".12" filter="url(#soft)"/>
  <text class="card-title" x="104" y="280">README.md</text>
  <text class="body" x="104" y="315">Public product story</text>
  <text class="small" x="104" y="344">what it does</text>
  <text class="small" x="104" y="370">who it supports</text>

  <rect x="380" y="206" width="280" height="224" rx="30" fill="url(#ink)" filter="url(#soft)"/>
  <text class="card-title-light" x="412" y="260">specs/README.md</text>
  <text class="body-light" x="412" y="296">Engineering memory</text>
  <text class="small-light" x="412" y="330">decisions</text>
  <text class="small-light" x="412" y="356">failed attempts</text>
  <text class="small-light" x="412" y="382">next work</text>

  <rect x="718" y="230" width="232" height="176" rx="28" fill="#fffaf0" stroke="#17120b" stroke-opacity=".12" filter="url(#soft)"/>
  <text class="card-title" x="750" y="280">AGENTS.md</text>
  <text class="body" x="750" y="315">Agent entry rules</text>
  <text class="small" x="750" y="344">same repo boundary</text>
  <text class="small" x="750" y="370">different agents</text>

  <line x1="326" y1="318" x2="372" y2="318" stroke="#2f6f5e" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="664" y1="318" x2="710" y2="318" stroke="#2f6f5e" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="954" y1="318" x2="1002" y2="318" stroke="url(#heat)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1008" y="194" width="210" height="270" rx="32" fill="url(#ink)" filter="url(#soft)"/>
  <text class="card-title-light" x="1038" y="250">Impact</text>
  <text class="card-title-light" x="1038" y="280">monitor</text>
  <text class="label" x="1038" y="324" fill="#e6a92f">SCORE 90</text>
  <rect x="1038" y="342" width="134" height="12" rx="6" fill="#2b3935"/>
  <rect x="1038" y="342" width="120" height="12" rx="6" fill="url(#heat)"/>
  <text class="label" x="1038" y="386" fill="#e6a92f">+70 UPLIFT</text>
  <polyline points="1038,426 1066,404 1094,414 1122,386 1150,392 1176,374" fill="none" stroke="#f2d6a4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="104" y="506" width="1072" height="70" rx="28" fill="#fff8e8" fill-opacity=".72" stroke="#17120b" stroke-opacity=".12"/>
  <text class="card-title" x="136" y="550">hook events</text>
  <text class="body" x="296" y="550">session-start -> pre-compact -> post-compact -> session-end</text>
  <text class="card-title" x="850" y="550" fill="#2f6f5e">next agent resumes warm</text>
</svg>
